name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

permissions:
  contents: read
  deployments: read
  pull-requests: read
  statuses: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Build
        run: npm run build

  deploy-preview:
    name: Deploy Preview
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Skip duplicate Vercel CLI preview deploy
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_TOKEN is not configured; skipping duplicate Vercel CLI preview deploy."
          echo "The Vercel GitHub App deployment/check handles preview deployments for this repo."

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel

      - name: Pull Vercel project settings
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --environment=preview --yes

      - name: Build project artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --environment=preview

      - name: Deploy to Vercel (Preview)
        if: env.VERCEL_TOKEN != ''
        id: deploy
        run: vercel deploy --prebuilt --environment=preview --yes

      - name: Comment on PR with preview URL
        if: env.VERCEL_TOKEN != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment ready for review\n:white_check_mark: Build passed\n:link: https://project-1-git-${{ github.event.pull_request.head.ref }}-steezkellys-projects.vercel.app`
            })

  smoke-test-preview:
    name: Smoke Tests (Preview)
    needs: deploy-preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Resolve Vercel preview URL
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          url="$(node <<'NODE'
          const { HEAD_SHA, REPOSITORY, GITHUB_TOKEN } = process.env;
          const headers = { 'User-Agent': 'github-actions-preview-url-resolver' };
          if (GITHUB_TOKEN) headers.Authorization = `Bearer ${GITHUB_TOKEN}`;
          const api = (path) => fetch(`https://api.github.com/repos/${REPOSITORY}${path}`, { headers }).then((r) => {
            if (!r.ok) throw new Error(`${r.status} ${r.statusText} for ${path}`);
            return r.json();
          });
          const deployments = await api(`/deployments?sha=${HEAD_SHA}&per_page=20`);
          const previewDeployments = deployments.filter((deployment) =>
            String(deployment.environment || '').toLowerCase().startsWith('preview') ||
            deployment.production_environment === false
          );
          if (previewDeployments.length === 0) throw new Error(`No Preview deployment found for ${HEAD_SHA}`);

          for (const deployment of previewDeployments) {
            const statuses = await api(`/deployments/${deployment.id}/statuses`);
            const success = statuses.find((status) => status.state === 'success' && (status.environment_url || status.target_url));
            if (success) {
              console.log(success.environment_url || success.target_url);
              process.exit(0);
            }
          }
          throw new Error(`No successful Preview deployment status found for ${HEAD_SHA}`);
          NODE
          )"
          echo "PREVIEW_URL=$url" >> "$GITHUB_ENV"
          echo "Resolved preview URL: $url"

      - name: Check preview access
        run: |
          set -euo pipefail
          status="$(curl -L -sS -o /tmp/preview.html -w '%{http_code}' "$PREVIEW_URL" || true)"
          if [ "$status" = "401" ] || [ "$status" = "403" ] || grep -qi '<title>Login .* Vercel</title>\|Provider.*accounts list is empty' /tmp/preview.html; then
            echo "SKIP_PREVIEW_SMOKE=true" >> "$GITHUB_ENV"
            echo "Preview is protected by Vercel login/SSO; skipping browser smoke tests for preview deployment."
            exit 0
          fi
          echo "SKIP_PREVIEW_SMOKE=false" >> "$GITHUB_ENV"

      - name: Run smoke tests against preview
        if: env.SKIP_PREVIEW_SMOKE != 'true'
        run: npx playwright test

  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Skip duplicate Vercel CLI production deploy
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_TOKEN is not configured; skipping duplicate Vercel CLI production deploy."
          echo "The Vercel GitHub App deployment/check handles production deployments for this repo."

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel

      - name: Pull Vercel project settings
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --environment=production --yes

      - name: Build project artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --environment=production

      - name: Deploy to Vercel (Production)
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --environment=production --yes --prod

  smoke-test-production:
    name: Smoke Tests (Production)
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests against production
        run: npx playwright test
        env:
          PREVIEW_URL: https://mainedispensaryguide.com
