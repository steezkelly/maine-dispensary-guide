name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

permissions:
  contents: read
  deployments: read
  pull-requests: read
  statuses: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Build
        run: npm run build

  deploy-preview:
    name: Deploy Preview
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Skip duplicate Vercel CLI preview deploy
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_TOKEN is not configured; skipping duplicate Vercel CLI preview deploy."
          echo "The Vercel GitHub App deployment/check handles preview deployments for this repo."

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel

      - name: Pull Vercel project settings
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --environment=preview --yes

      - name: Build project artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --environment=preview

      - name: Deploy to Vercel (Preview)
        if: env.VERCEL_TOKEN != ''
        id: deploy
        run: vercel deploy --prebuilt --environment=preview --yes

      - name: Comment on PR with preview URL
        if: env.VERCEL_TOKEN != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment ready for review\n:white_check_mark: Build passed\n:link: https://project-1-git-${{ github.event.pull_request.head.ref }}-steezkellys-projects.vercel.app`
            })

  smoke-test-preview:
    name: Smoke Tests (Preview)
    needs: deploy-preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Resolve Vercel preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          url="$({
            gh api repos/${{ github.repository }}/deployments \
              -f sha="$HEAD_SHA" \
              -f environment=Preview \
              --jq '.[0].id' | {
                read -r deployment_id
                if [ -n "${deployment_id:-}" ] && [ "$deployment_id" != "null" ]; then
                  gh api repos/${{ github.repository }}/deployments/$deployment_id/statuses \
                    --jq 'map(select(.state == "success") | .environment_url // .target_url) | .[0]'
                fi
              }
          } || true)"
          if [ -z "${url:-}" ] || [ "$url" = "null" ]; then
            echo "Could not resolve successful Vercel preview URL for $HEAD_SHA" >&2
            exit 1
          fi
          echo "PREVIEW_URL=$url" >> "$GITHUB_ENV"
          echo "Resolved preview URL: $url"

      - name: Run smoke tests against preview
        run: npx playwright test

  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Skip duplicate Vercel CLI production deploy
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_TOKEN is not configured; skipping duplicate Vercel CLI production deploy."
          echo "The Vercel GitHub App deployment/check handles production deployments for this repo."

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel

      - name: Pull Vercel project settings
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --environment=production --yes

      - name: Build project artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --environment=production

      - name: Deploy to Vercel (Production)
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --environment=production --yes --prod

  smoke-test-production:
    name: Smoke Tests (Production)
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests against production
        run: npx playwright test
        env:
          PREVIEW_URL: https://mainedispensaryguide.com
