<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Deep Spruce circular background -->
  <circle cx="32" cy="32" r="30" fill="#0D4E50"/>

  <!-- Geometric pine tree - 3 layered triangles for simple silhouette -->
  <!-- Bottom tier -->
  <polygon points="32,52 16,36 48,36" fill="#588157"/>
  <!-- Middle tier -->
  <polygon points="32,40 18,24 46,24" fill="#588157"/>
  <!-- Top tier -->
  <polygon points="32,18 22,32 42,32" fill="#588157"/>

  <!-- Tree trunk -->
  <rect x="28" y="50" width="8" height="6" fill="#588157"/>

  <!-- Warm Bone diamond accent at top -->
  <polygon points="32,14 28,18 32,22 36,18" fill="#F2F2E2"/>
</svg>
