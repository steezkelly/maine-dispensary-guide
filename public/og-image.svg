<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D4E50"/>
      <stop offset="100%" style="stop-color:#083638"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#588157"/>
      <stop offset="100%" style="stop-color:#7A9A6A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#588157" stroke-width="2" opacity="0.3" rx="8"/>
  
  <!-- Pine Tree Icon (left) -->
  <g transform="translate(120, 200)" opacity="0.9">
    <polygon points="60,0 0,120 120,120" fill="#588157"/>
    <polygon points="60,40 10,140 110,140" fill="#7A9A6A"/>
    <polygon points="60,80 20,160 100,160" fill="#588157"/>
    <rect x="50" y="160" width="20" height="40" fill="#8B6F47"/>
  </g>
  
  <!-- Leaf Icon (right) -->
  <g transform="translate(950, 220)" opacity="0.9">
    <ellipse cx="50" cy="80" rx="30" ry="80" fill="#588157" transform="rotate(-30 50 80)"/>
    <line x1="50" y1="160" x2="50" y2="200" stroke="#8B6F47" stroke-width="4"/>
  </g>
  
  <!-- Geometric accents -->
  <polygon points="100,80 110,60 120,80" fill="#588157" opacity="0.5"/>
  <polygon points="1080,520 1090,500 1100,520" fill="#588157" opacity="0.5"/>
  <circle cx="150" cy="550" r="8" fill="#588157" opacity="0.3"/>
  <circle cx="1050" cy="80" r="8" fill="#588157" opacity="0.3"/>
  
  <!-- Main Text -->
  <text x="600" y="280" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#F2F2E2" text-anchor="middle">
    Maine Dispensary Guide
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="28" fill="#C4D4B6" text-anchor="middle">
    Your Complete Guide to Opening a Cannabis Dispensary
  </text>
  
  <!-- Divider line -->
  <line x1="400" y1="370" x2="800" y2="370" stroke="url(#accent)" stroke-width="3"/>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="22" fill="#A3B18A" text-anchor="middle">
    Licensing &#x2022; Regulations &#x2022; Market Analysis &#x2022; City Guides
  </text>
  
  <!-- URL -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="20" fill="#7A9A6A" text-anchor="middle">
    mainedispensaryguide.com
  </text>
</svg>
