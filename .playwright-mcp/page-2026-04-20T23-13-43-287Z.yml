      - paragraph [ref=e112]: The guide walks founders through four phases, each with actionable checklists, estimated timelines, and Common Pitfall warnings from real operators who have navigated this process before.
      - generic [ref=e113]:
        - generic [ref=e114]:
          - 'heading "Phase 1: Entity Formation (Months 1-2)" [level=3] [ref=e115]'
          - paragraph [ref=e116]: Form your Maine LLC or corporation, obtain an EIN, open a cannabis-friendly bank account, and begin your OCP Individual Identification Card (IIC) application. The guide includes a bank comparison chart of Maine's seven cannabis-friendly financial institutions.
        - generic [ref=e117]:
          - 'heading "Phase 2: Location & Zoning (Months 2-5)" [level=3] [ref=e118]'
          - paragraph [ref=e119]: Identify municipalities that have Opted-In to adult-use retail. Execute a lease with a cannabis clause. Complete municipal zoning approval and site plan review. The guide provides a contact list for planning offices in all 15 Opted-In communities.
        - generic [ref=e120]:
          - 'heading "Phase 3: State Licensing (Months 4-8)" [level=3] [ref=e121]'
          - paragraph [ref=e122]: Submit your Conditional License application to the Maine OCP. Prepare for the 60-day public comment period. Complete buildout to OCP specifications. Pass final inspection. The guide includes a $12,000 contingency budget for unexpected licensing delays.
        - generic [ref=e123]:
          - 'heading "Phase 4: Opening & Compliance (Month 9+)" [level=3] [ref=e124]'
          - paragraph [ref=e125]: Launch with a compliant inventory, trained staff, and Metrc seed-to-sale integration. Navigate IRS Section 280E tax obligations from day one. The guide includes a 90-day post-launch checklist for maintaining compliance.
