          - generic [ref=e254]:
            - heading "Real Estate Considerations" [level=2] [ref=e255]
            - paragraph [ref=e256]: "Commercial real estate in Portland is the most expensive in Maine. Commercial real estate in Portland is the most expensive in Maine. Limited availability and high demand from restaurants and retail make it tough to find space. The historic building stock adds to the challenge. Dispensary operators need specific configurations: security vault, budroom, compliant ventilation, and accessible entrance."
            - paragraph [ref=e257]: Congress Street and the Old Port command the highest rents, $35-45 per square foot annually for ground floor retail. These spaces are also the smallest and least likely to have the square footage a dispensary needs. Finding a 1,200-1,500 square foot space in the Old Port is nearly impossible. Most historic buildings there have smaller footprints. This forces either a more compact footprint with creative space planning. Or you look to adjacent streets.
            - paragraph [ref=e258]: Forest Avenue has better availability and lower rent, $25-35 per square foot, with more space options. The traffic is more car-based than pedestrian, but the corridor is well-traveled and connects to residential neighborhoods. A dispensary here serves the local community more than the tourist trade.
            - paragraph [ref=e259]: The outer areas — outer Congress Street, the Jetport area, and adjacent streets — offer the most affordable options, $18-28 per square foot, with easier parking and more space. The tradeoff is lower visibility and a less distinctive address. For an established brand with a strong reputation, these locations might work. For a new entrant trying to build awareness, the visibility trade-off is costly.
            - paragraph [ref=e260]: All Portland locations face the 500-foot school buffer. The city has multiple schools, and the buffer affects many downtown parcels. Verify any potential address against school locations before committing. The city's planning department can provide official buffer zone documentation.
          - generic [ref=e261]:
            - heading "Key Takeaways" [level=2] [ref=e262]
            - list [ref=e263]:
              - listitem [ref=e264]:
                - strong [ref=e265]: Maine's largest market
                - text: — 68,000 residents plus 130,000 metro, plus significant tourist traffic from states without legal cannabis
              - listitem [ref=e266]:
                - strong [ref=e267]: high-quality positioning works
                - text: — Portland customers pay 15-25% more for quality and will research your menu before visiting
              - listitem [ref=e268]:
                - strong [ref=e269]: Saturation is real
                - text: — 12+ dispensaries means differentiation is not optional; you need a genuine point of difference to survive
              - listitem [ref=e270]:
                - strong [ref=e271]: Local cultivator partnerships are essential
                - text: — Not a nice-to-have; this is how you build a defensible brand in Portland
              - listitem [ref=e272]:
                - strong [ref=e273]: Local licensing adds timeline and cost
                - text: — $5,000 annual local fee, city council approval required, 60-90 day additional process
              - listitem [ref=e274]:
                - strong [ref=e275]: Real estate is the hard part
                - text: — Finding 1,200-1,500 sq ft in the right location at a workable rent is genuinely difficult
              - listitem [ref=e276]:
                - strong [ref=e277]: "Startup costs: $500K+ is realistic"
                - text: — Do not underestimate the capital required; Portland is not a market where you can skimp
              - listitem [ref=e278]:
                - strong [ref=e279]: "Location strategy:"
                - text: Congress Street core for high-quality/tourist positioning; Forest Avenue for volume/local; outer areas for value/regional
