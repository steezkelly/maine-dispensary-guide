          - generic [ref=e103]:
            - heading "The Portland Opportunity" [level=2] [ref=e104]
            - paragraph [ref=e105]: Portland is Maine's largest city — 68,000 residents, 130,000+ in the metro area. It is the economic and cultural center of the state, with a diverse economy built on healthcare, tourism, food service, education, and creative industries. Portland draws customers from across Maine and New England, making it the highest-traffic cannabis market in the state by a significant margin.
            - paragraph [ref=e106]: "The customer base here is different from anywhere else in Maine: educated, discerning, willing to pay more for quality. Portland consumers do their research before purchasing. They read menu listings, compare products, and form preferences based on cultivation methods, strain genetics, and brand reputation. Coming into this market with generic products and no story is a losing strategy."
            - paragraph [ref=e107]: Tourism amplifies the Portland opportunity significantly. During peak summer and fall seasons, Portland's population effectively multiplies as visitors from Maine, New Hampshire, Massachusetts, and beyond converge on the Old Port, the waterfront, and the restaurant scene. These tourists include a disproportionate number from states without legal cannabis — Massachusetts residents who vacation in Maine, New Yorkers who drove up, Canadians exploring New England. They represent incremental demand on top of an already substantial local market.
