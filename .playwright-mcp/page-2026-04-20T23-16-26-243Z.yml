      - generic [ref=e72]:
        - 'heading "Preface: The Soul of Maine Craft" [level=2] [ref=e73]'
        - paragraph [ref=e74]: In 2026, Maine stands as the last bastion of independent craft cannabis. While other states have succumbed to corporate integration, the Pine Tree State rewards those who value quality, community, and compliance. This guide is your anchor. By the end of these 10 pages, you will have a more technical and strategic understanding of the Maine market than 90% of your competitors.
      - generic [ref=e75]:
        - 'heading "Chapter 1: The Pre-Flight Checklist (Month 1-2)" [level=2] [ref=e76]'
        - paragraph [ref=e77]: Before you sign a lease or buy a single seed, you must secure your "Foundation."
        - heading "1.1 The Founding Trinity" [level=3] [ref=e78]
        - paragraph [ref=e79]: "Do not go into this alone. The OCP (Office of Cannabis Policy) and 280E tax rules will crush a solo founder. You need a \"Trinity\" of skills:"
        - list [ref=e80]:
          - listitem [ref=e81]:
            - strong [ref=e82]: "The Operator:"
            - text: Focuses on retail flow and customer experience.
          - listitem [ref=e83]:
            - strong [ref=e84]: "The Compliance Shield:"
            - text: Obsessed with Metrc and statutory updates.
          - listitem [ref=e85]:
            - strong [ref=e86]: "The Visionary:"
            - text: Manages the brand and sources the elite local flower.
        - heading "1.2 The \"Cannabis-Ready\" Entity" [level=3] [ref=e87]
        - paragraph [ref=e88]:
          - text: Register your LLC/Corp with the Secretary of State.
          - strong [ref=e89]: "Critical Requirement:"
          - text: Your Operating Agreement must explicitly authorize the "sale and distribution of adult-use cannabis." Without this, the OCP will reject your application during the "Financial Integrity" check.
      - generic [ref=e90]:
        - 'heading "Chapter 2: The Municipal Chess Match (Month 3-4)" [level=2] [ref=e91]'
        - paragraph [ref=e92]:
          - text: In Maine, the State gives permission, but the
          - strong [ref=e93]: Town gives the key.
        - heading "2.1 The Opt-In Audit" [level=3] [ref=e94]
        - paragraph [ref=e95]:
          - text: Verify your target town is on the
          - link "OCP Municipal Opt-In List" [ref=e96] [cursor=pointer]:
            - /url: https://www.maine.gov/dafs/ocp/adult-use/municipal-opt-in
          - text: .
        - list [ref=e97]:
          - listitem [ref=e98]:
            - strong [ref=e99]: "The \"Westbrook Trap\":"
            - text: Just because a town allows "Medical" does NOT mean they allow "Adult-Use Retail." Always check the specific land-use ordinance for "Retail Storefront."
        - heading "2.2 The \"Entrance-to-Entrance\" Rule" [level=3] [ref=e100]
        - paragraph [ref=e101]: Maine law requires a 1,000ft (or town-reduced 300ft) buffer from schools.
        - list [ref=e102]:
          - listitem [ref=e103]:
            - strong [ref=e104]: "The Measurement:"
            - text: Many founders measure from property line to property line and get rejected. The OCP measures from your
            - strong [ref=e105]: Primary Entrance
            - text: to the
            - strong [ref=e106]: Primary Entrance
            - text: of the school. This 10-foot difference can make or break your location.
      - generic [ref=e107]:
        - 'heading "Chapter 3: The 280E Tax Fortress" [level=2] [ref=e108]'
        - paragraph [ref=e109]:
          - emphasis [ref=e110]: Protecting your profit from the IRS.
        - heading "3.1 Understanding the 280E Reality" [level=3] [ref=e111]
        - paragraph [ref=e112]:
          - text: IRS Code 280E prohibits you from deducting "Ordinary Business Expenses" (Rent, Payroll, Marketing). You are taxed on
          - strong [ref=e113]: Gross Profit
          - text: ", not Net."
        - list [ref=e114]:
          - listitem [ref=e115]:
            - strong [ref=e116]: "The COGS Strategy:"
            - text: To survive, you must legally maximize your
            - strong [ref=e117]: Cost of Goods Sold (COGS)
            - text: .
          - listitem [ref=e118]:
            - strong [ref=e119]: "Pro-Hack:"
            - text: Work with your CPA to allocate "Inventory Management Labor" as a COGS expense. If your staff spends 4 hours a day on intake and auditing, that labor may be deductible!
      - generic [ref=e120]:
        - 'heading "Chapter 4: The OCP Gauntlet (Month 5-8)" [level=2] [ref=e121]'
        - paragraph [ref=e122]:
          - emphasis [ref=e123]: Winning your ticket to the market.
        - paragraph [ref=e124]:
          - text: The Maine
          - link "Office of Cannabis Policy (OCP)" [ref=e125] [cursor=pointer]:
