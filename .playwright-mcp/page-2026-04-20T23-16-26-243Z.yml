          - text: uses a rigorous three-stage protocol. Precision is more important than speed.
        - heading "4.1 Conditional Licensure" [level=3] [ref=e126]
        - paragraph [ref=e127]: This is the "Background Phase."
        - list [ref=e128]:
          - listitem [ref=e129]:
            - strong [ref=e130]: "The IIC/AIC Rule:"
            - text: Every officer must have an Authorized Individual Card (AIC). Every employee needs an Individual Identification Card (IIC).
          - listitem [ref=e131]:
            - strong [ref=e132]: "Wait Time:"
            - text: 30-60 days. Once you have this, you have "State Permission" to seek a local license.
        - heading "4.2 Local Authorization" [level=3] [ref=e133]
        - paragraph [ref=e134]: You take your state conditional license to the Town.
        - list [ref=e135]:
          - listitem [ref=e136]:
            - strong [ref=e137]: "The Hearing:"
            - text: Be prepared for a public hearing. Focus your presentation on
            - strong [ref=e138]: Security
            - text: and
            - strong [ref=e139]: Community Safety
            - text: ", not just profits."
          - listitem [ref=e140]:
            - strong [ref=e141]: "The Local License:"
            - text: Once the town signs your "Local Authorization Form," you return to the state for the final gate.
        - heading "4.3 Active Licensure & Final Inspection" [level=3] [ref=e142]
        - paragraph [ref=e143]: This is the "Hardware Phase." An OCP investigator will physically visit your shop.
        - list [ref=e144]:
          - listitem [ref=e145]:
            - strong [ref=e146]: "Checklist:"
            - text: They will verify camera angles, vault integrity, and ensure "Limited Access Area" signs are posted.
          - listitem [ref=e147]:
            - strong [ref=e148]: "The Reward:"
            - text: Once passed, you pay your annual fee ($1,500-$10,000) and receive your Active License.
