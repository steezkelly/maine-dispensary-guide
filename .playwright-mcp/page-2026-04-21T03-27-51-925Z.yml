    - region "What It Takes to Run One" [ref=e123]:
      - generic [ref=e124]:
        - generic [ref=e125]:
          - generic [ref=e126]: Day-to-Day Reality
          - heading "What It Takes to Run One" [level=2] [ref=e127]
        - generic [ref=e128]:
          - paragraph [ref=e129]: Getting a license is just the start. The actual work of running a dispensary — managing inventory, staying compliant with OCP security rules, training staff who can actually explain the difference between a sativa and an indica — is where most operators discover whether they chose the right business.
          - paragraph [ref=e130]: Maine customers, especially in the Portland metro area and mid-coast college towns, care about craft and transparency. They ask questions about cultivation methods. They read menu listings before they visit. The shops that do the work on staff training — that treat budtenders as product experts rather than cashiers — tend to build real loyalty.
          - generic [ref=e131]:
            - link "Point-of-Sale Systems" [ref=e132] [cursor=pointer]:
              - /url: /guides/maine-dispensary-pos/
            - link "Metrc Compliance" [ref=e133] [cursor=pointer]:
