    - region "Why Maine, Why Now" [ref=e102]:
      - generic [ref=e103]:
        - generic [ref=e104]:
          - generic [ref=e105]: The Opportunity
          - heading "Why Maine, Why Now" [level=2] [ref=e106]
        - generic [ref=e107]:
          - generic [ref=e108]:
            - paragraph [ref=e109]: Maine has a medical program operating since 1999 and an adult-use market open since 2020. That combination means established patterns, more data, and a clearer picture of what works than newer state markets.
            - paragraph [ref=e110]: The Office of Cannabis Policy (OCP) oversees the industry with regulations mature enough to be predictable — you can read the actual rules, follow the actual processes, and know where the actual pitfalls are.
            - paragraph [ref=e111]: Towns must opt-in before a dispensary can operate within their borders. For entrepreneurs, this means location research is not optional — it is the first and most important strategic decision you will make.
