              - /url: /guides/maine-cannabis-taxation-280e/
            - link "Launch Checklist" [ref=e135] [cursor=pointer]:
              - /url: /launch-checklist/
          - paragraph [ref=e136]: "The operators who survive past year two tend to share certain habits: meticulous record-keeping, proactive communication with OCP, and a genuine interest in what their customers want. The ones who do not make it tend to have ignored one or more of those three."
