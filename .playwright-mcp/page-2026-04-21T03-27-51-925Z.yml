        - generic [ref=e95]:
          - paragraph [ref=e96]: Opening a dispensary in Maine is a real business with real regulations. But if you have a vision for what your shop could be — this guide exists to help you get there without getting tripped up on compliance.
          - generic [ref=e97]:
            - paragraph [ref=e98]: "We built this resource for entrepreneurs who are serious about doing this correctly: the ones who want to understand the M.R.S. citations, negotiate their own commercial lease, and file their 280E deductions properly rather than relying on luck."
